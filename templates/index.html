<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nook</title>
<script>
  document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');
</script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div id="app">
    <header>
      <h1><a href="https://github.com/farid98/nook" target="_blank" rel="noopener noreferrer" title="View on GitHub">Nook</a></h1>
      <span class="model-name" id="model-name">{{ model_name }}</span>
      <span class="context-info" id="context-info" title="Context tokens used / context window size"></span>
      <label class="web-search-toggle" title="Let the model search the web and fetch pages">
        <input type="checkbox" id="web-search-toggle">
        Web search
      </label>
      <button id="theme-toggle" type="button" title="Toggle light/dark theme">🌙</button>
      <button id="settings-btn" type="button" title="Settings">Settings</button>
      <button id="reset-btn" type="button">Reset</button>
    </header>
    <div id="ollama-banner" class="ollama-banner" role="alert" hidden></div>
    <main id="messages"></main>
    <div id="attachment-previews"></div>
    <form id="chat-form">
      <input type="file" id="attach-input" accept="image/*,.pdf,.txt,.md" multiple hidden>
      <textarea id="chat-input" placeholder="Type a message..." rows="2"></textarea>
      <button type="button" id="attach-btn" title="Attach an image or document">📎</button>
      <button type="button" id="mic-btn" title="Speak your prompt">🎤</button>
      <button type="submit" id="send-btn">Send</button>
    </form>
  </div>

  <dialog id="settings-dialog">
    <form id="settings-form">
      <h2>Settings</h2>

      <label>
        Model
        <select name="model_name" required></select>
      </label>

      <label>
        System prompt
        <textarea name="system_prompt" rows="3"></textarea>
      </label>

      <label>
        Temperature <span class="value" data-value-for="temperature"></span>
        <input type="range" name="temperature" min="0" max="2" step="0.05">
      </label>

      <label>
        Top P <span class="value" data-value-for="top_p"></span>
        <input type="range" name="top_p" min="0" max="1" step="0.05">
      </label>

      <label>
        Top K
        <input type="number" name="top_k" min="1" max="200" step="1">
      </label>

      <label>
        Repeat penalty <span class="value" data-value-for="repeat_penalty"></span>
        <input type="range" name="repeat_penalty" min="0.5" max="2" step="0.05">
      </label>

      <label>
        Context window (tokens)
        <input type="number" name="num_ctx" min="512" max="131072" step="512">
      </label>

      <label>
        Max output tokens
        <input type="number" name="num_predict" min="-1" max="8192" step="64">
      </label>

      <label class="checkbox-label">
        <input type="checkbox" id="unlimited-tokens">
        Unlimited output (no token cap, stops naturally)
      </label>

      <label>
        Voice output (🔊 button)
        <select name="tts_engine">
          <option value="browser">Browser (system voice, instant)</option>
          <option value="kokoro">Kokoro (local neural TTS, more natural)</option>
        </select>
      </label>

      <p class="settings-note">Saving starts a new conversation. Changing the context window or model may take a moment to reload. Kokoro downloads a ~170MB model on first use.</p>

      <div class="dialog-actions">
        <button type="button" id="settings-defaults">Defaults</button>
        <button type="button" id="settings-cancel">Cancel</button>
        <button type="submit">Save &amp; New Chat</button>
      </div>
    </form>
  </dialog>

  <script src="{{ url_for('static', filename='vendor/marked.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/purify.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/mermaid.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
